version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy   # ✅ wait until db passes healthcheck
    env_file:
      - ./backend/.env

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin@123
      POSTGRES_DB: cloudshop
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:                     # ✅ add healthcheck
      test: ["CMD-SHELL", "pg_isready -U postgres -d cloudshop"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

